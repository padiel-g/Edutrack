name: Backend CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edutrack_test
          POSTGRES_USER: edutrack
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edutrack -d edutrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      FLASK_APP: wsgi.py
      FLASK_ENV: development
      SECRET_KEY: ci-secret-key-that-is-at-least-32-characters
      JWT_SECRET_KEY: ci-jwt-secret-that-is-at-least-32-characters
      DATABASE_URL: postgresql://edutrack:test-password@127.0.0.1:5432/edutrack_test
      CORS_ORIGINS: http://localhost:3000
      FORCE_HTTPS: "false"
      TRUST_PROXY: "false"
      RATELIMIT_STORAGE_URI: memory://
      JWT_BLOCKLIST_STORAGE_URI: memory://

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: flask db upgrade
      - run: flask db current
      - run: pytest -q
